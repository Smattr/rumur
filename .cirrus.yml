task:

  # only test the main branch and pull requests
  only_if: $CIRRUS_BRANCH == "main" || $CIRRUS_PR != ""

  # increase timeout to the maximum limit
  timeout_in: 120m

  matrix:
    - name: FreeBSD 15.0
      freebsd_instance:
        image_family: freebsd-15-0-amd64-ufs
      install_script: pkg upgrade -y && pkg install -y bash bison cmake gmp libxml2 py311-pytest z3
    - name: FreeBSD 15.0, shared libraries
      freebsd_instance:
        image_family: freebsd-15-0-amd64-ufs
      environment:
        CMAKE_OPTIONS: -DBUILD_SHARED_LIBS=ON
      install_script: pkg upgrade -y && pkg install -y bash bison cmake gmp libxml2 py311-pytest z3
    - name: FreeBSD 14.3
      freebsd_instance:
        image_family: freebsd-14-3
      install_script: pkg upgrade -y && pkg install -y bash bison cmake gmp libxml2 py311-pytest z3
    - name: FreeBSD 14.3, shared libraries
      freebsd_instance:
        image_family: freebsd-14-3
      environment:
        CMAKE_OPTIONS: -DBUILD_SHARED_LIBS=ON
      install_script: pkg upgrade -y && pkg install -y bash bison cmake gmp libxml2 py311-pytest z3
    - name: FreeBSD 13.5
      freebsd_instance:
        image_family: freebsd-13-5
      install_script: pkg upgrade -y && pkg install -y bash bison cmake gmp libxml2 py311-pytest z3
    - name: FreeBSD 13.5, shared libraries
      freebsd_instance:
        image_family: freebsd-13-5
      environment:
        CMAKE_OPTIONS: -DBUILD_SHARED_LIBS=ON
      install_script: pkg upgrade -y && pkg install -y bash bison cmake gmp libxml2 py311-pytest z3

    - name: Linux, GCC 9.5
      container:
        image: gcc:9.5
      environment:
        DEBIAN_FRONTEND: noninteractive
        CXXFLAGS: -pedantic -Werror -g
      install_script: apt-get update -y && apt-get install --no-install-recommends -y bison cmake libfl-dev libgmp-dev python3-pytest
    - name: Linux, GCC 15.2
      container:
        image: gcc:15.2
      environment:
        DEBIAN_FRONTEND: noninteractive
        CXXFLAGS: -pedantic -Werror -Wno-error=overloaded-virtual -g -fno-omit-frame-pointer -fsanitize=address,undefined -fno-sanitize-recover=undefined
        UBSAN_OPTIONS: print_stacktrace=1
      install_script: apt-get update -y && apt-get install --no-install-recommends -y bison cmake libfl-dev libgmp-dev libxml2-utils python3-pytest strace z3
    - name: Linux, ARM, GCC 15.2
      arm_container:
        image: gcc:15.2
      environment:
        DEBIAN_FRONTEND: noninteractive
        CXXFLAGS: -pedantic -Werror -Wno-error=overloaded-virtual -g -fsanitize=address,undefined -fno-sanitize-recover=undefined
        UBSAN_OPTIONS: print_stacktrace=1
      install_script: apt-get update -y && apt-get install --no-install-recommends -y bison cmake libfl-dev libgmp-dev libxml2-utils python3-pytest strace z3

  test_script: uname -rms && python3 --version && cmake ${CMAKE_OPTIONS:-} -B build -S . && cmake --build build && ${SUDO:-} cmake --install build && cmake --build build --target check
